#ddev-generated
services:
  whatsapp:
    container_name: ddev-${DDEV_SITENAME}-whatsapp
    build:
      context: ../
      dockerfile: .ddev/whatsapp-build/Dockerfile
    image: ddev-${DDEV_SITENAME}-whatsapp
    hostname: ${DDEV_SITENAME}-whatsapp
    working_dir: /app
    volumes:
      - type: bind
        source: ../whatsapp-api
        target: /app
        consistency: cached
      - /app/node_modules
      - wa_session:/app/.wwebjs_auth
    environment:
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_DOWNLOAD=true
      - TZ=Asia/Jakarta
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/status', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  wa_session:
